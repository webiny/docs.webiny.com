name: Generate Release Notes

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Webiny version to generate release notes for (e.g. 6.1.0)"
        required: true
        type: string

jobs:
  generate:
    name: Generate changelog and upgrade guide
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate changelog
        env:
          CLAUDE_KEY: ${{ secrets.CLAUDE_KEY }}
        run: yarn tsx scripts/generate-changelog.ts --version ${{ inputs.version }}

      - name: Generate upgrade guide
        run: yarn tsx scripts/generate-upgrade-guide.ts --version ${{ inputs.version }}

      - name: Create branch and commit
        run: |
          BRANCH="release/${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/release-notes/${{ inputs.version }}/
          git commit -m "docs: add release notes for ${{ inputs.version }}"
          git push origin "$BRANCH"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Release - ${{ inputs.version }}" \
            --base master \
            --head "release/${{ inputs.version }}" \
            --body "$(cat <<'EOF'
          ## Release Notes — ${{ inputs.version }}

          This PR was automatically generated by the [Generate Release Notes](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

          ### What's included

          - \`docs/release-notes/${{ inputs.version }}/changelog.mdx\` — AI-generated from merged PRs in the [${{ inputs.version }} milestone](https://github.com/webiny/webiny-js/milestone) on webiny/webiny-js
          - \`docs/release-notes/${{ inputs.version }}/upgrade-guide.mdx\` — boilerplate upgrade guide, ready to be filled in

          ### Before merging

          - [ ] Review and edit the AI-generated changelog for accuracy and tone
          - [ ] Fill in any additional context or breaking change details in the upgrade guide
          - [ ] Add any extra release articles (e.g. migration guides, feature deep-dives) to the same branch
          - [ ] Verify pages render correctly in the Netlify preview
          EOF
          )"
