name: Check Release Notes

on:
  pull_request:
    branches:
      - master
    paths:
      - "docs/release-notes/**"

jobs:
  review-markers:
    name: Ensure changelog entries are confirmed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check for unresolved review markers
        run: yarn check:changelog-review
